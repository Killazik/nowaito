services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nowaito
      POSTGRES_PASSWORD: nowaito
      POSTGRES_DB: nowaito
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://nowaito:nowaito@postgres:5432/nowaito
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret
      JWT_REFRESH_SECRET: super-refresh-secret
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:

