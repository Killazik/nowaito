app = "nowaito-api"
primary_region = "fra"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "3000"
  DATABASE_URL = "file:/data/nowaito.db"
  UPLOAD_DIR = "/data/uploads"

[[mounts]]
  source = "nowaito_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
