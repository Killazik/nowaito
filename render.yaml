services:
  # Backend service
  - type: web
    name: nowaito-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run generate && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: nowaito-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
    disk:
      name: uploads
      mountPath: /tmp/uploads
      sizeGB: 1

  # Frontend service
  - type: web
    name: nowaito-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nowaito-api
          property: host
        value: https://nowaito-api.onrender.com
      - key: VITE_WS_URL
        fromService:
          type: web
          name: nowaito-api
          property: host
        value: https://nowaito-api.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://nowaito-api.onrender.com/api/*
      - type: rewrite
        source: /socket.io/*
        destination: https://nowaito-api.onrender.com/socket.io/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: nowaito-db
    databaseName: nowaito
    user: nowaito
    plan: free
