app = "nowaito-web"
primary_region = "fra"

[build]
  dockerfile = "frontend/Dockerfile"

  [build.args]
    VITE_API_URL = "https://nowaito-api.fly.dev"
    VITE_WS_URL = "https://nowaito-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
